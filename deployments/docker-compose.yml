x-bot-env: &bot-env
  API_BASE_URL: http://server:8000
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD environment variable is required}

x-bot-base: &bot-base
  build:
    context: ..
    dockerfile: deployments/docker/Dockerfile.bot
  depends_on:
    - server

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD environment variable is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-paperstreet}
    ports:
      - "3306:3306"
    volumes:
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.server
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD environment variable is required}
      DATABASE_DSN: ${DATABASE_DSN:-root:${MYSQL_ROOT_PASSWORD}@tcp(db:3306)/${MYSQL_DATABASE:-paperstreet}?parseTime=true}
    depends_on:
      db:
        condition: service_healthy

  market_maker:
    <<: *bot-base
    command: ["./market_maker"]
    environment:
      <<: *bot-env
      BOT_ROLE: market_maker

  news_reactor:
    <<: *bot-base
    command: ["./news_reactor"]
    environment:
      <<: *bot-env
      BOT_ROLE: news_reactor
    stdin_open: true
    tty: true

  momentum_chaser_a:
    <<: *bot-base
    command: ["./momentum_chaser"]
    environment:
      <<: *bot-env
      BOT_ROLE: momentum_chaser_a
      ASSET_ID: "101"

  momentum_chaser_b:
