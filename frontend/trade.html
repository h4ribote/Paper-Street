<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Street | Trade</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' },
                        trading: { up: '#0ecb81', up_bg: 'rgba(14, 203, 129, 0.1)', down: '#f6465d', down_bg: 'rgba(246, 70, 93, 0.1)' },
                        dark: { bg: '#0b0e11', panel: '#181a20', border: '#2b3139', text: '#eaecef', muted: '#848e9c' }
                    },
                    fontSize: { 'xxs': '0.65rem' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/trade.css">
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans text-sm bg-dark-bg">

    <!-- Navbar -->
    <header id="main-header"></header>

    <!-- Main Content Wrapper -->
    <div class="flex-1 overflow-hidden relative flex gap-1 p-1" id="main-content">
        <!-- Left Sidebar: Markets -->
        <aside class="w-64 panel flex flex-col shrink-0 hidden md:flex border border-dark-border bg-dark-panel rounded">
            <div class="p-3 border-b border-dark-border">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-dark-muted text-xs"></i>
                    <input type="text" placeholder="検索" class="w-full bg-dark-bg text-white text-xs rounded border border-dark-border pl-8 pr-3 py-1.5 focus:outline-none focus:border-brand-500">
                </div>
                <div class="flex justify-between mt-2 text-xxs text-dark-muted font-mono">
                    <span>ペア</span>
                    <div class="flex gap-2">
                        <span>価格</span>
                        <span>変動</span>
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto" id="market-list">
                <!-- JS will populate -->
            </div>
        </aside>

        <!-- Center: Chart & Positions -->
        <section class="flex-1 flex flex-col gap-1 min-w-0">
            <!-- Ticker Header -->
            <div class="panel h-16 flex items-center px-4 shrink-0 gap-6 overflow-x-auto hide-scrollbar border border-dark-border bg-dark-panel rounded" id="ticker-header">
                <!-- JS will populate -->
            </div>

            <!-- Chart Area -->
            <div class="panel flex-1 relative flex flex-col min-h-[300px] border border-dark-border bg-dark-panel rounded">
                <div class="h-10 border-b border-dark-border flex items-center px-3 gap-4 text-xs font-medium text-dark-muted shrink-0">
                    <div class="flex gap-2" id="chart-timeframes">
                        <button class="hover:text-white" data-tf="1m">1m</button>
                        <button class="text-brand-500" data-tf="15m">15m</button>
                        <button class="hover:text-white" data-tf="1h">1H</button>
                        <button class="hover:text-white" data-tf="4h">4H</button>
                        <button class="hover:text-white" data-tf="1d">1D</button>
                    </div>
                </div>
                <!-- Chart Container -->
                <div id="tvchart" class="flex-1 w-full relative"></div>
            </div>

            <!-- Positions / Orders -->
            <div class="panel h-64 shrink-0 flex flex-col hidden sm:flex border border-dark-border bg-dark-panel rounded">
                <div class="flex gap-6 px-4 pt-3 border-b border-dark-border text-sm font-medium text-dark-muted">
                    <button class="text-white border-b-2 border-brand-500 pb-2 tab-btn" data-target="open-orders">オープンオーダー</button>
                    <button class="hover:text-white pb-2 tab-btn" data-target="positions">ポジション</button>
                    <button class="hover:text-white pb-2 tab-btn" data-target="trade-history">取引履歴</button>
                </div>
                <div class="flex-1 overflow-auto p-0 relative">
                    <div id="open-orders" class="tab-content w-full h-full">
                        <table class="w-full text-left text-xs">
                            <thead class="text-dark-muted sticky top-0 bg-dark-panel z-10 border-b border-dark-border">
                                <tr>
                                    <th class="py-2 px-4 font-normal">ID</th>
                                    <th class="py-2 px-4 font-normal">時間</th>
                                    <th class="py-2 px-4 font-normal">ペア</th>
                                    <th class="py-2 px-4 font-normal">タイプ</th>
                                    <th class="py-2 px-4 font-normal">サイド</th>
                                    <th class="py-2 px-4 font-normal">価格</th>
                                    <th class="py-2 px-4 font-normal">数量</th>
                                    <th class="py-2 px-4 font-normal text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody class="font-mono" id="orders-body"></tbody>
                        </table>
                    </div>
                    <div id="positions" class="tab-content hidden w-full h-full">
                        <table class="w-full text-left text-xs">
                            <thead class="text-dark-muted sticky top-0 bg-dark-panel z-10 border-b border-dark-border">
                                <tr>
                                    <th class="py-2 px-4 font-normal">ペア</th>
                                    <th class="py-2 px-4 font-normal">サイズ</th>
                                    <th class="py-2 px-4 font-normal">参入価格</th>
                                    <th class="py-2 px-4 font-normal text-right">未実現損益</th>
                                </tr>
                            </thead>
                            <tbody class="font-mono" id="positions-body"></tbody>
                        </table>
                    </div>
                    <div id="trade-history" class="tab-content hidden w-full h-full">
                        <table class="w-full text-left text-xs">
                            <thead class="text-dark-muted sticky top-0 bg-dark-panel z-10 border-b border-dark-border">
                                <tr>
                                    <th class="py-2 px-4 font-normal">時間</th>
                                    <th class="py-2 px-4 font-normal">ペア</th>
                                    <th class="py-2 px-4 font-normal">価格</th>
                                    <th class="py-2 px-4 font-normal">数量</th>
                                    <th class="py-2 px-4 font-normal">役割</th>
                                </tr>
                            </thead>
                            <tbody class="font-mono" id="trades-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Sidebar: Orderbook & Trading Panel -->
        <aside class="w-80 flex flex-col gap-1 shrink-0">
            <!-- Order Book -->
            <div class="panel flex-1 flex flex-col overflow-hidden min-h-[250px] border border-dark-border bg-dark-panel rounded">
                <div class="flex justify-between px-3 py-2 text-xxs text-dark-muted font-mono shrink-0 border-b border-dark-border">
                    <span>価格</span>
                    <span>数量</span>
                    <span>合計</span>
                </div>

                <!-- Asks (Sells) -->
                <div class="flex-1 flex flex-col justify-end overflow-hidden relative" id="orderbook-asks"></div>

                <!-- Mid Price -->
                <div class="py-2 px-3 flex items-center justify-center border-y border-dark-border bg-dark-bg shrink-0">
                    <div class="flex items-center gap-2">
                        <span class="font-mono font-bold text-lg" id="ob-mid-price">--</span>
                        <i class="fa-solid fa-minus text-xs" id="ob-mid-arrow"></i>
                    </div>
                </div>

                <!-- Bids (Buys) -->
                <div class="flex-1 flex flex-col overflow-hidden relative" id="orderbook-bids"></div>
            </div>

            <!-- Trading Panel -->
            <div class="panel shrink-0 flex flex-col p-4 noselect border border-dark-border bg-dark-panel rounded">
                <div class="flex bg-dark-bg rounded p-1 mb-4 text-xs font-medium">
                    <button class="flex-1 py-1.5 rounded bg-dark-panel text-white shadow" id="btn-type-limit">指値</button>
                    <button class="flex-1 py-1.5 rounded text-dark-muted hover:text-white" id="btn-type-market">成行</button>
                    <button class="flex-1 py-1.5 rounded text-dark-muted hover:text-white" id="btn-type-stop">ストップ</button>
                </div>

                <div class="flex justify-between text-xs text-dark-muted mb-2">
                    <span>利用可能</span>
                    <span class="font-mono text-white" id="available-balance">--</span>
                </div>

                <form id="order-form" class="space-y-3">
                    <input type="hidden" id="order-type" value="LIMIT">

                    <div class="flex items-center bg-dark-bg border border-dark-border rounded px-3 py-2 focus-within:border-brand-500 transition-colors" id="price-input-group">
                        <span class="text-dark-muted text-xs w-12">価格</span>
                        <input type="number" id="order-price" step="0.00000001" min="0" class="flex-1 bg-transparent text-right font-mono text-sm outline-none text-white" required>
                    </div>

                    <div class="flex items-center bg-dark-bg border border-dark-border rounded px-3 py-2 focus-within:border-brand-500 transition-colors hidden" id="stop-price-input-group">
                        <span class="text-dark-muted text-xs w-16">ストップ</span>
                        <input type="number" id="order-stop-price" step="0.00000001" min="0" class="flex-1 bg-transparent text-right font-mono text-sm outline-none text-white">
                    </div>

                    <div class="flex items-center bg-dark-bg border border-dark-border rounded px-3 py-2 focus-within:border-brand-500 transition-colors">
                        <span class="text-dark-muted text-xs w-12">数量</span>
                        <input type="number" id="order-quantity" step="0.00000001" min="0" placeholder="0.00" class="flex-1 bg-transparent text-right font-mono text-sm outline-none text-white" required>
                    </div>

                    <div class="flex items-center bg-dark-bg border border-dark-border rounded px-3 py-2 focus-within:border-brand-500 transition-colors">
                        <span class="text-dark-muted text-xs w-16">レバレッジ</span>
                        <input type="number" id="order-leverage" value="1" min="1" max="100" class="flex-1 bg-transparent text-right font-mono text-sm outline-none text-white">
                        <span class="text-dark-muted text-xs ml-2">x</span>
                    </div>

                    <div class="mt-4 flex gap-2">
                        <button type="button" id="btn-buy" class="flex-1 bg-trading-up hover:opacity-90 text-white font-bold py-3 rounded text-sm transition-opacity flex flex-col items-center leading-tight shadow-[0_0_10px_rgba(14,203,129,0.3)]">
                            <span>買 (Long)</span>
                        </button>
                        <button type="button" id="btn-sell" class="flex-1 bg-trading-down hover:opacity-90 text-white font-bold py-3 rounded text-sm transition-opacity flex flex-col items-center leading-tight shadow-[0_0_10px_rgba(246,70,93,0.3)]">
                            <span>売 (Short)</span>
                        </button>
                    </div>
                </form>
            </div>
        </aside>
    </div>

    <script type="module" src="/js/pages/trade.js"></script>
</body>
</html>
