<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paper Street | Trade</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-require-auth="true">
  <div id="app" class="app">
    <header class="panel header-panel">
      <div class="header-left">
        <h1>Paper Street Terminal</h1>
        <p class="muted">Trade</p>
      </div>
      <div class="header-right">
        <div class="status-item"><span>HTTP</span><strong id="http-status">-</strong></div>
        <div class="status-item"><span>WS</span><strong id="ws-status">-</strong></div>
        <div class="status-item"><span>Asset</span><strong id="selected-asset-label">-</strong></div>
      </div>
    </header>

    <section class="panel control-panel">
      <div class="controls-grid">
        <label>API Base URL
          <input id="api-base-url" type="url" placeholder="http://localhost:8000" />
        </label>
        <label>API Key
          <input id="api-key" type="text" placeholder="20-char hex" autocomplete="off" />
        </label>
        <label>Bot Role (optional)
          <input id="bot-role" type="text" placeholder="market_maker" />
        </label>
        <label>Admin Password (for /auth/login)
          <input id="admin-password" type="password" placeholder="admin password" />
        </label>
      </div>
      <div class="controls-actions">
        <button id="btn-login" type="button">Re-Login</button>
        <button id="btn-connect" type="button">Connect WS</button>
        <button id="btn-disconnect" type="button">Disconnect WS</button>
        <button id="btn-refresh" type="button">Refresh</button>
        <button id="btn-logout" type="button" class="secondary">Logout</button>
      </div>
      <div class="controls-actions page-links">
        <a class="page-link" href="/dashboard.html">Dashboard</a>
        <a class="page-link" href="/trade.html">Trade</a>
        <a class="page-link" href="/portfolio.html">Portfolio</a>
        <a class="page-link" href="/news.html">News</a>
      </div>
    </section>

    <main class="grid">
      <section class="panel" id="market-watch-panel">
        <h2>Market Watch</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Symbol</th><th>Price</th><th>Change</th><th>Volume</th></tr></thead>
            <tbody id="market-watch-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="order-entry-panel">
        <h2>Order Entry</h2>
        <form id="order-form" class="form-grid">
          <label>Asset
            <select id="order-asset"></select>
          </label>
          <label>Side
            <select id="order-side">
              <option value="BUY">BUY</option>
              <option value="SELL">SELL</option>
            </select>
          </label>
          <label>Type
            <select id="order-type">
              <option value="MARKET">MARKET</option>
              <option value="LIMIT">LIMIT</option>
              <option value="STOP">STOP</option>
              <option value="STOP_LIMIT">STOP_LIMIT</option>
            </select>
          </label>
          <label>TIF
            <select id="order-tif">
              <option value="GTC">GTC</option>
              <option value="IOC">IOC</option>
              <option value="FOK">FOK</option>
            </select>
          </label>
          <label>Quantity
            <input id="order-quantity" type="number" min="1" step="1" required />
          </label>
          <label>Price
            <input id="order-price" type="number" min="0" step="1" />
          </label>
          <label>Stop Price
            <input id="order-stop-price" type="number" min="0" step="1" />
          </label>
          <label>Leverage
            <input id="order-leverage" type="number" min="1" max="5" step="1" value="1" />
          </label>
          <button type="submit" id="btn-submit-order">Submit Order</button>
        </form>
      </section>

      <section class="panel" id="orderbook-panel">
        <h2>Order Book</h2>
        <div class="orderbook-grid">
          <div>
            <h3>Bids</h3>
            <div class="table-wrap slim">
              <table>
                <thead><tr><th>Price</th><th>Qty</th></tr></thead>
                <tbody id="orderbook-bids"></tbody>
              </table>
            </div>
          </div>
          <div>
            <h3>Asks</h3>
            <div class="table-wrap slim">
              <table>
                <thead><tr><th>Price</th><th>Qty</th></tr></thead>
                <tbody id="orderbook-asks"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" id="timesales-panel">
        <h2>Time &amp; Sales</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Time</th><th>Price</th><th>Qty</th><th>Side</th></tr></thead>
            <tbody id="trades-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="orders-panel">
        <h2>Open Orders</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Asset</th><th>Side</th><th>Type</th><th>Qty</th><th>Rem</th><th>Price</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="log-panel">
        <h2>Log</h2>
        <pre id="log-output" class="mono log-output"></pre>
      </section>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
