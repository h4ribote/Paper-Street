<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Street | DEX (Swap & Liquidity)</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' },
                        trading: { up: '#0ecb81', up_bg: 'rgba(14, 203, 129, 0.1)', down: '#f6465d', down_bg: 'rgba(246, 70, 93, 0.1)' },
                        dark: { bg: '#0b0e11', panel: '#181a20', border: '#2b3139', text: '#eaecef', muted: '#848e9c' }
                    },
                    fontSize: { 'xxs': '0.65rem' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dex-panel {
            max-width: 480px;
            width: 100%;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans text-sm bg-dark-bg text-dark-text">

    <!-- Navbar -->
    <header id="main-header"></header>

    <!-- Main Content Wrapper -->
    <div class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col items-center gap-6" id="main-content">
        
        <!-- Tabs -->
        <div class="flex gap-4 border-b border-dark-border mb-4 w-full max-w-lg justify-center">
            <button class="pb-2 px-4 text-white font-medium border-b-2 border-brand-500 tab-btn" data-target="swap-panel">スワップ (Swap)</button>
            <button class="pb-2 px-4 text-dark-muted hover:text-white font-medium border-b-2 border-transparent tab-btn" data-target="liquidity-panel">流動性 (Liquidity)</button>
        </div>

        <!-- Swap Panel -->
        <div id="swap-panel" class="dex-panel tab-content panel p-6 border border-dark-border bg-dark-panel rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-6">スワップ</h2>
            <form id="swap-form" class="space-y-4">
                
                <div class="bg-dark-bg p-4 rounded-lg border border-dark-border">
                    <div class="flex justify-between text-xs text-dark-muted mb-2">
                        <span>支払う金額 (From)</span>
                        <span id="swap-from-bal">残高: --</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <select id="swap-from-asset" class="bg-transparent border-none text-white font-bold text-lg focus:ring-0 outline-none w-1/3 cursor-pointer">
                            <!-- JS populated -->
                        </select>
                        <input type="number" id="swap-amount" step="0.0001" min="0" placeholder="0.00" class="flex-1 w-full bg-transparent text-right font-mono text-2xl outline-none text-white" required>
                    </div>
                </div>

                <div class="flex justify-center -my-2 relative z-10">
                    <button type="button" id="btn-swap-flip" class="w-8 h-8 rounded-full bg-dark-border hover:bg-brand-500 border border-dark-panel flex items-center justify-center text-white transition-colors">
                        <i class="fa-solid fa-arrow-down"></i>
                    </button>
                </div>

                <div class="bg-dark-bg p-4 rounded-lg border border-dark-border">
                    <div class="flex justify-between text-xs text-dark-muted mb-2">
                        <span>受け取る通貨 (To)</span>
                        <span id="swap-to-bal">残高: --</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <select id="swap-to-asset" class="bg-transparent border-none text-white font-bold text-lg focus:ring-0 outline-none w-1/3 cursor-pointer">
                            <!-- JS populated -->
                        </select>
                        <input type="text" id="swap-estimated" readonly placeholder="--" class="flex-1 w-full bg-transparent text-right font-mono text-xl outline-none text-dark-muted cursor-not-allowed">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="btn-submit-swap" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-4 rounded-lg text-lg transition-colors shadow">
                        スワップ実行
                    </button>
                </div>
            </form>
        </div>

        <!-- Liquidity Panel -->
        <div id="liquidity-panel" class="dex-panel tab-content hidden panel p-6 border border-dark-border bg-dark-panel rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-6">流動性追加 (Add Liquidity)</h2>
            <form id="liquidity-form" class="space-y-4">
                
                <div>
                    <label class="block text-xs text-dark-muted mb-1">対象プール</label>
                    <select id="liquidity-pool" class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-white outline-none focus:border-brand-500">
                        <option value="">読込中...</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-dark-bg p-3 rounded border border-dark-border focus-within:border-brand-500 transition-colors">
                        <div class="text-xs text-dark-muted mb-1" id="lp-base-label">Base Amount</div>
                        <input type="number" id="lp-base-amount" step="0.0001" min="0" placeholder="0.00" class="w-full bg-transparent font-mono outline-none text-white" required>
                    </div>
                    <div class="bg-dark-bg p-3 rounded border border-dark-border focus-within:border-brand-500 transition-colors">
                        <div class="text-xs text-dark-muted mb-1" id="lp-quote-label">Quote Amount</div>
                        <input type="number" id="lp-quote-amount" step="0.0001" min="0" placeholder="0.00" class="w-full bg-transparent font-mono outline-none text-white" required>
                    </div>
                </div>

                <!-- Tick Range (Concentrated Liquidity) -->
                <div class="pt-2">
                    <label class="block text-xs text-dark-muted mb-2">提供価格帯 (Ticks)</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-dark-bg p-2 rounded border border-dark-border flex flex-col">
                            <span class="text-xxs text-dark-muted">Lower Tick</span>
                            <input type="number" id="lp-lower-tick" class="bg-transparent font-mono outline-none text-white text-sm" required>
                        </div>
                        <div class="bg-dark-bg p-2 rounded border border-dark-border flex flex-col">
                            <span class="text-xxs text-dark-muted">Upper Tick</span>
                            <input type="number" id="lp-upper-tick" class="bg-transparent font-mono outline-none text-white text-sm" required>
                        </div>
                    </div>
                    <p class="text-xxs text-dark-muted mt-2">※集中流動性の範囲を指定します。指定範囲を相場が外れた場合、手数料は発生しません。</p>
                </div>

                <div class="pt-4">
                    <button type="submit" id="btn-add-liquidity" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 rounded-lg transition-colors">
                        流動性を提供する
                    </button>
                </div>
            </form>
        </div>

        <!-- My Liquidity Positions -->
        <div class="w-full max-w-4xl mt-8">
            <h3 class="text-lg font-bold mb-4">マイ・流動性ポジション</h3>
            <div class="overflow-x-auto border border-dark-border rounded bg-dark-panel">
                <table class="w-full text-left text-sm">
                    <thead class="text-dark-muted bg-dark-bg border-b border-dark-border">
                        <tr>
                            <th class="py-3 px-4 font-normal">プール</th>
                            <th class="py-3 px-4 font-normal text-right">流動性 (Liquidity)</th>
                            <th class="py-3 px-4 font-normal text-right">範囲 (Lower - Upper)</th>
                            <th class="py-3 px-4 font-normal text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody class="font-mono divide-y divide-dark-border" id="lp-positions-body">
                        <!-- JS populated -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module" src="/js/pages/dex.js"></script>
</body>
</html>
