<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Street | Advanced Crypto Exchange</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        },
                        trading: {
                            up: '#0ecb81',
                            up_bg: 'rgba(14, 203, 129, 0.1)',
                            down: '#f6465d',
                            down_bg: 'rgba(246, 70, 93, 0.1)',
                        },
                        dark: {
                            bg: '#0b0e11',
                            panel: '#181a20',
                            border: '#2b3139',
                            text: '#eaecef',
                            muted: '#848e9c'
                        }
                    },
                    fontSize: {
                        'xxs': '0.65rem',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans text-sm bg-dark-bg text-dark-text">

    <!-- Navbar -->
    <header id="main-header"></header>

    <!-- Main Content Wrapper -->
    <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-dark-bg flex items-center justify-center">
        <div class="max-w-3xl w-full flex flex-col gap-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">次世代の仮想通貨取引プラットフォーム</h1>
            <p class="text-dark-muted text-lg">プロフェッショナルなトレーダーのための高度なツールと流動性。</p>

            <div class="flex justify-center gap-4">
                <a href="/login.html" class="bg-brand-600 hover:bg-brand-500 text-white px-8 py-4 rounded font-bold text-lg transition-colors shadow-[0_0_20px_rgba(37,99,235,0.4)]">取引を始める</a>
            </div>

            <!-- Market Overview Mini -->
            <div class="mt-12 text-left">
                <h2 class="text-xl font-bold text-white mb-4">主要マーケット</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4" id="index-market-watch">
                    <!-- JS will populate this -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadHeader } from '/js/components/header.js';
        import { renderIndexMarketWatch } from '/js/components/market-watch.js';

        document.addEventListener('DOMContentLoaded', () => {
            loadHeader('index');
            renderIndexMarketWatch();
        });
    </script>
</body>
</html>
