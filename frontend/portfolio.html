<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Street | Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' },
                        trading: { up: '#0ecb81', up_bg: 'rgba(14, 203, 129, 0.1)', down: '#f6465d', down_bg: 'rgba(246, 70, 93, 0.1)' },
                        dark: { bg: '#0b0e11', panel: '#181a20', border: '#2b3139', text: '#eaecef', muted: '#848e9c' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans text-sm bg-dark-bg">

    <!-- Navbar -->
    <header id="main-header"></header>

    <!-- Main Content Wrapper -->
    <div class="flex-1 overflow-y-auto p-4 md:p-6" id="main-content">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            <h2 class="text-2xl font-bold text-white">資産状況</h2>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Balance Summary -->
                <div class="panel p-6 lg:col-span-2 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border border-dark-border bg-dark-panel rounded">
                    <div>
                        <div class="text-dark-muted text-sm mb-2">総残高 (ARC推定)</div>
                        <div class="text-4xl md:text-5xl font-mono font-bold text-white mb-3 tracking-tight" id="portfolio-total-arc">--</div>
                    </div>
                </div>

                <!-- User Info -->
                <div class="panel p-6 flex flex-col justify-center border border-dark-border bg-dark-panel rounded">
                    <div class="text-dark-muted text-sm font-bold mb-4">アカウント情報</div>
                    <pre id="portfolio-user-info" class="text-xs font-mono text-white bg-dark-bg p-3 rounded overflow-x-auto border border-dark-border">--</pre>
                </div>
            </div>

            <!-- Assets List -->
            <div class="panel flex-1 flex flex-col p-0 border border-dark-border overflow-hidden bg-dark-panel rounded">
                <div class="flex gap-6 px-6 pt-4 border-b border-dark-border text-sm font-medium text-dark-muted bg-dark-bg/50">
                    <button class="text-white border-b-2 border-brand-500 pb-3">保有資産</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="text-dark-muted border-b border-dark-border bg-dark-bg">
                            <tr>
                                <th class="py-3 px-6 font-normal">通貨</th>
                                <th class="py-3 px-6 font-normal text-right">残高</th>
                            </tr>
                        </thead>
                        <tbody class="font-mono text-white" id="portfolio-balances">
                            <!-- JS will populate -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Margin Positions List -->
            <div class="panel flex-1 flex flex-col p-0 border border-dark-border overflow-hidden bg-dark-panel rounded mt-4">
                <div class="flex gap-6 px-6 pt-4 border-b border-dark-border text-sm font-medium text-dark-muted bg-dark-bg/50">
                    <button class="text-white border-b-2 border-brand-500 pb-3">マージンポジション</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="text-dark-muted border-b border-dark-border bg-dark-bg">
                            <tr>
                                <th class="py-3 px-6 font-normal">ID</th>
                                <th class="py-3 px-6 font-normal">アセット</th>
                                <th class="py-3 px-6 font-normal">サイド</th>
                                <th class="py-3 px-6 font-normal text-right">数量</th>
                                <th class="py-3 px-6 font-normal text-right">未実現損益</th>
                            </tr>
                        </thead>
                        <tbody class="font-mono text-white" id="portfolio-positions">
                            <!-- JS will populate -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="/js/pages/portfolio.js"></script>
</body>
</html>
