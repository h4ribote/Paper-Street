<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信用取引 - BTC/USD | Paper Street</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0b0e11', panel: '#181a20', border: '#2b3139',
                        primary: '#fcd535', buy: '#0ecb81', sell: '#f6465d', textMuted: '#848e9c',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 2px; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <!-- Header -->
    <nav class="bg-panel border-b border-border px-4 py-2 flex items-center justify-between shrink-0 h-[56px]">
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="text-lg font-bold text-primary tracking-tighter">PAPER STREET</a>
            <div class="flex items-center gap-4 text-sm font-medium text-textMuted">
                <a href="spot.html" class="hover:text-white">現物</a>
                <a href="margin.html" class="text-white">信用</a>
                <a href="swap.html" class="hover:text-white">スワップ</a>
            </div>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <div>
                <span class="text-xl font-bold bg-dark px-2 py-1 rounded border border-primary text-primary">BTC/USD 10x</span>
            </div>
            <div>
                <div class="text-xs text-textMuted">現在価格</div>
                <div class="font-bold text-buy">64,230.50</div>
            </div>
            <!-- Margin Info -->
            <div class="pl-4 border-l border-border hidden lg:block">
                <div class="text-xs text-textMuted">マージンリスク率</div>
                <div class="font-bold text-buy">245.5%</div>
            </div>
        </div>
        <div>
            <a href="portfolio.html" class="text-sm hover:text-primary"><i class="fa-solid fa-wallet"></i></a>
        </div>
    </nav>

    <!-- Trading Layout (Similar to Spot but with leverage UI) -->
    <main class="flex-1 flex gap-1 p-1 bg-dark overflow-hidden">
        
        <!-- Left: Market List -->
        <aside class="w-[280px] bg-panel flex flex-col shrink-0 rounded-sm overflow-hidden">
             <!-- ... same as spot ... -->
             <div class="p-2 border-b border-border">
                <div class="text-sm font-bold text-white mb-2">分離マージン銘柄</div>
             </div>
             <div class="flex-1 overflow-y-auto">
                <div class="flex text-xs px-3 py-2 hover:bg-dark cursor-pointer bg-dark border-l-2 border-primary">
                    <div class="flex-1 font-bold flex items-center gap-1">BTC <span class="bg-border text-[10px] px-1 rounded">10x</span></div>
                    <div class="w-20 text-right">64,230.5</div>
                </div>
            </div>
        </aside>

        <!-- Center: Chart & Order Form -->
        <section class="flex-1 flex flex-col gap-1 min-w-0">
            <div class="flex-1 bg-panel rounded-sm relative flex items-center justify-center border border-border">
                <div class="text-border text-6xl opacity-20"><i class="fa-solid fa-chart-candlestick"></i></div>
            </div>
            
            <!-- Margin Order Form -->
            <div class="h-[340px] shrink-0 bg-panel rounded-sm p-4 flex flex-col border border-border">
                <div class="flex justify-between items-center border-b border-border pb-2 mb-4">
                    <div class="flex gap-6 text-sm font-medium">
                        <button class="text-primary border-b-2 border-primary -mb-[9px] pb-2">指値</button>
                        <button class="text-textMuted hover:text-white pb-2">成行</button>
                    </div>
                    <!-- Leverage Selector -->
                    <div class="flex items-center gap-2">
                        <span class="bg-dark px-3 py-1 rounded text-xs border border-border cursor-pointer hover:border-primary">分離</span>
                        <div class="bg-dark px-3 py-1 rounded text-xs border border-border flex items-center gap-2 cursor-pointer hover:border-primary">
                            10x <i class="fa-solid fa-pen text-textMuted"></i>
                        </div>
                    </div>
                </div>

                <div class="flex-1 flex gap-8">
                    <!-- Buy/Long Side -->
                    <div class="flex-1 flex flex-col">
                        <div class="flex justify-between text-xs text-textMuted mb-2">
                            <span>借入可能</span>
                            <span>120,000.00 USD</span>
                        </div>
                        <div class="flex items-center bg-dark border border-border rounded px-3 py-2 mb-4">
                            <span class="text-textMuted text-xs w-12 shrink-0">価格</span>
                            <input type="number" value="64230.50" class="w-full bg-transparent text-right text-sm focus:outline-none">
                            <span class="text-textMuted text-xs ml-2">USD</span>
                        </div>
                        <div class="flex items-center bg-dark border border-border rounded px-3 py-2 mb-4">
                            <span class="text-textMuted text-xs w-12 shrink-0">数量</span>
                            <input type="number" placeholder="0.00" class="w-full bg-transparent text-right text-sm focus:outline-none">
                            <span class="text-textMuted text-xs ml-2">BTC</span>
                        </div>
                        <div class="mt-auto">
                            <label class="flex items-center gap-2 text-xs text-textMuted mb-2 cursor-pointer">
                                <input type="checkbox" class="accent-primary" checked> 自動借入
                            </label>
                            <button class="w-full bg-buy text-white font-bold py-2 rounded hover:bg-green-600 transition">買い / ロング</button>
                        </div>
                    </div>
                    <!-- Sell/Short Side -->
                    <div class="flex-1 flex flex-col">
                        <div class="flex justify-between text-xs text-textMuted mb-2">
                            <span>借入可能</span>
                            <span>1.8500 BTC</span>
                        </div>
                        <div class="flex items-center bg-dark border border-border rounded px-3 py-2 mb-4">
                            <span class="text-textMuted text-xs w-12 shrink-0">価格</span>
                            <input type="number" value="64230.50" class="w-full bg-transparent text-right text-sm focus:outline-none">
                            <span class="text-textMuted text-xs ml-2">USD</span>
                        </div>
                        <div class="flex items-center bg-dark border border-border rounded px-3 py-2 mb-4">
                            <span class="text-textMuted text-xs w-12 shrink-0">数量</span>
                            <input type="number" placeholder="0.00" class="w-full bg-transparent text-right text-sm focus:outline-none">
                            <span class="text-textMuted text-xs ml-2">BTC</span>
                        </div>
                        <div class="mt-auto">
                            <label class="flex items-center gap-2 text-xs text-textMuted mb-2 cursor-pointer">
                                <input type="checkbox" class="accent-primary" checked> 自動借入
                            </label>
                            <button class="w-full bg-sell text-white font-bold py-2 rounded hover:bg-red-600 transition">売り / ショート</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right: Orderbook (Same as spot visually) -->
        <aside class="w-[320px] flex flex-col gap-1 shrink-0 bg-panel border border-border">
            <div class="p-4 text-center text-textMuted text-sm my-auto">
                <i class="fa-solid fa-list-ol text-2xl mb-2"></i><br>オーダーブック
            </div>
        </aside>
    </main>

    <!-- Bottom: Positions -->
    <footer class="h-[250px] shrink-0 bg-panel border-t border-border flex flex-col">
        <div class="flex gap-6 px-4 pt-2 border-b border-border text-sm font-medium">
            <button class="text-primary border-b-2 border-primary -mb-[1px] pb-2">ポジション (1)</button>
            <button class="text-textMuted hover:text-white pb-2">オープンオーダー</button>
            <button class="text-textMuted hover:text-white pb-2">借入履歴</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4">
            <table class="w-full text-left text-xs">
                <thead class="text-textMuted">
                    <tr>
                        <th class="pb-2 font-normal">ペア</th>
                        <th class="pb-2 font-normal">サイズ</th>
                        <th class="pb-2 font-normal">参入価格</th>
                        <th class="pb-2 font-normal">マーク価格</th>
                        <th class="pb-2 font-normal text-right">清算価格</th>
                        <th class="pb-2 font-normal text-right">マージン比率</th>
                        <th class="pb-2 font-normal text-right">未実現PNL (ROE%)</th>
                        <th class="pb-2 font-normal text-right">アクション</th>
                    </tr>
                </thead>
                <tbody class="font-mono">
                    <tr class="hover:bg-dark border-b border-border/50">
                        <td class="py-3 font-sans font-bold flex items-center gap-1"><span class="w-1 h-3 bg-sell inline-block rounded"></span> BTC/USD</td>
                        <td class="py-3 text-sell">-0.500</td>
                        <td class="py-3">65,000.00</td>
                        <td class="py-3">64,230.50</td>
                        <td class="py-3 text-right text-primary">71,500.00</td>
                        <td class="py-3 text-right">15.5%</td>
                        <td class="py-3 text-right text-buy">+384.75 (+11.8%)</td>
                        <td class="py-3 text-right"><button class="bg-border text-white px-2 py-1 rounded hover:bg-gray-600 font-sans">成行返済</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </footer>
</body>
</html>
