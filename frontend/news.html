<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Street | News</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' },
                        dark: { bg: '#0b0e11', panel: '#181a20', border: '#2b3139', text: '#eaecef', muted: '#848e9c' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/news.css">
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans text-sm bg-dark-bg">

    <!-- Navbar -->
    <header id="main-header"></header>

    <!-- Main Content Wrapper -->
    <div class="flex-1 overflow-hidden relative p-4 md:p-6" id="main-content">
        <div class="max-w-7xl mx-auto h-full flex flex-col md:flex-row gap-6">
            <!-- Filters Sidebar -->
            <aside class="w-full md:w-64 panel p-4 shrink-0 overflow-y-auto flex flex-col gap-6 bg-dark-panel border border-dark-border rounded">
                <div>
                    <h3 class="font-bold text-white mb-3">検索</h3>
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-dark-muted text-xs"></i>
                        <input type="text" id="news-search" placeholder="キーワード..." class="w-full bg-dark-bg text-white text-sm rounded border border-dark-border pl-8 pr-3 py-2 focus:outline-none focus:border-brand-500">
                    </div>
                </div>
                <div>
                    <h3 class="font-bold text-white mb-3">フィルタ</h3>
                    <button id="btn-refresh-news" class="w-full bg-dark-bg border border-dark-border hover:bg-dark-border text-white px-4 py-2 rounded text-sm transition-colors flex justify-center items-center gap-2">
                        <i class="fa-solid fa-rotate-right"></i> 更新
                    </button>
                </div>
            </aside>

            <!-- News Feed -->
            <div class="panel flex-1 p-0 overflow-hidden flex flex-col border border-dark-border bg-dark-panel rounded">
                <div class="p-4 border-b border-dark-border flex justify-between items-center bg-dark-bg/50">
                    <h2 class="text-xl font-bold text-white">最新ニュース</h2>
                </div>
                <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-6" id="news-container">
                    <!-- JS will populate -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/pages/news.js"></script>
</body>
</html>
